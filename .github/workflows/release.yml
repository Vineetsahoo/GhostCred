name: Release and SLSA Compliance

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write # Required for keyless Sigstore signing

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest, ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Sign Docker image
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0.15.8
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}
          format: spdx-json
          output-file: ghostcred-sbom.spdx.json

      - name: Sign SBOM
        run: cosign sign-blob --yes ghostcred-sbom.spdx.json --bundle ghostcred-sbom.spdx.json.sig

      - name: Upload SBOM to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ghostcred-sbom.spdx.json
            ghostcred-sbom.spdx.json.sig
