name: GhostCred Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  secret-scan:
    name: GhostCred AI-Toolchain Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git-lineage tracing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install GhostCred
        run: pip install -e .

      - name: Download CI run logs (for lineage tracking)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .ghostcred/ci-logs
          gh run list --limit 5 --json databaseId -q '.[].databaseId' | \
            while read run_id; do
              gh run view "$run_id" --log > ".ghostcred/ci-logs/run-${run_id}.txt" 2>/dev/null || true
            done
        continue-on-error: true

      - name: Run GhostCred scan
        env:
          # Set GHOSTCRED_SALT as a repository secret for stable fingerprints across runs.
          # If not set, a random salt is used (findings won't be comparable run-to-run).
          GHOSTCRED_SALT: ${{ secrets.GHOSTCRED_SALT }}
        run: |
          ghostcred scan \
            --path . \
            --no-global-configs \
            --lineage \
            --dry-run \
            --json-out ghostcred-report.json
          # Note: min_confidence, ignore_paths, and ci_log_dir are read from
          # .ghostcred.yml committed to the repo — no need to repeat them here.

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghostcred-report
          path: ghostcred-report.json
          retention-days: 30

      - name: Comment findings on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = {};
            try { report = JSON.parse(fs.readFileSync('ghostcred-report.json', 'utf8')); } catch {}
            const count = (report.findings || []).length;
            if (count > 0) {
              const body = [
                `## ❌ GhostCred: ${count} secret(s) detected`,
                '',
                '| Provider | Source Kind | Location | Confidence |',
                '|----------|-------------|----------|------------|',
                ...(report.findings || []).map(f =>
                  `| \`${f.provider}\` | \`${f.source_kind}\` | \`${f.source_path}:${f.line}\` | ${f.confidence} |`
                ),
                '',
                '> Secrets found in source files or MCP/IDE configs. Please review.',
              ].join('\n');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
